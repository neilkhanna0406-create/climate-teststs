<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;}
.banner{width:100%;height:100vh;overflow:hidden;position:relative;background:linear-gradient(180deg,#1a3a5c 0%,#2a5a3a 70%,#1a3a20 100%);}
.ray{position:absolute;top:0;width:18px;transform-origin:top center;animation:raypulse 3s ease-in-out infinite;}
@keyframes raypulse{0%,100%{opacity:.08;}50%{opacity:.22;}}
.cloud{position:absolute;background:rgba(255,255,255,.18);border-radius:50px;animation:drift linear infinite;}
@keyframes drift{from{transform:translateX(-150px);}to{transform:translateX(110vw);}}
.rdrop{position:absolute;width:1.5px;border-radius:2px;background:rgba(140,200,255,.7);animation:rfall linear infinite;}
@keyframes rfall{0%{transform:translateY(-15px);opacity:.8;}100%{transform:translateY(110vh);opacity:0;}}
.tw{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;white-space:nowrap;}
.ey{font-family:Georgia,serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(100,200,255,.85);margin-bottom:6px;animation:fu .8s ease both;}
.mt{font-family:Georgia,serif;font-weight:700;color:#fff;font-size:52px;line-height:1.1;animation:fu .8s ease .15s both;text-shadow:0 2px 20px rgba(0,0,0,.8);}
.mt span{color:#64c8ff;}
.br{height:3px;background:#64c8ff;border-radius:2px;margin:8px auto 0;animation:gb 1s ease .3s both;}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes gb{from{width:0;}to{width:60px;}}
</style>
</head>
<body>
<div class="banner">
  <div class="ray" style="left:28%;height:100vh;background:linear-gradient(rgba(255,220,80,.15),transparent);animation-delay:0s;transform:rotate(-15deg);"></div>
  <div class="ray" style="left:36%;height:100vh;background:linear-gradient(rgba(255,220,80,.1),transparent);animation-delay:.5s;transform:rotate(-8deg);width:24px;"></div>
  <div class="ray" style="left:44%;height:100vh;background:linear-gradient(rgba(255,220,80,.12),transparent);animation-delay:1s;transform:rotate(0deg);width:14px;"></div>
  <div class="ray" style="left:51%;height:100vh;background:linear-gradient(rgba(255,220,80,.1),transparent);animation-delay:1.5s;transform:rotate(8deg);"></div>
  <div class="cloud" style="width:110px;height:30px;top:12%;animation-duration:18s;animation-delay:0s;"></div>
  <div class="cloud" style="width:70px;height:20px;top:28%;animation-duration:24s;animation-delay:-8s;"></div>
  <div class="cloud" style="width:140px;height:35px;top:8%;animation-duration:30s;animation-delay:-15s;"></div>
  <div class="cloud" style="width:85px;height:22px;top:40%;animation-duration:20s;animation-delay:-5s;"></div>
  <div class="rdrop" style="left:5%;height:14px;animation-duration:1.1s;animation-delay:0s;"></div>
  <div class="rdrop" style="left:15%;height:11px;animation-duration:.9s;animation-delay:.3s;"></div>
  <div class="rdrop" style="left:28%;height:15px;animation-duration:1.2s;animation-delay:.6s;"></div>
  <div class="rdrop" style="left:62%;height:12px;animation-duration:1s;animation-delay:.2s;"></div>
  <div class="rdrop" style="left:77%;height:14px;animation-duration:1.1s;animation-delay:.5s;"></div>
  <div class="rdrop" style="left:91%;height:11px;animation-duration:.9s;animation-delay:.8s;"></div>
  <div class="tw">
    <div class="ey">Tropical Rainforest</div>
    <div class="mt">&#9925; <span>Climate</span></div>
    <div class="br"></div>
  </div>
</div>
</body>
</html>
